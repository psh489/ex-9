

<style>
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
  @keyframes coinSpin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,200,50,0.3); }
    50% { box-shadow: 0 0 50px rgba(255,200,50,0.7); }
  }
  @keyframes fallDown {
    0% { top: -10%; opacity: 1; }
    100% { top: 105%; opacity: 0.7; }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .lucky-wrap {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at center, #fff9e6 0%, #fff3cc 40%, #ffeaa0 100%);
    border-radius: var(--border-radius-lg);
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: fallDown linear infinite;
    pointer-events: none;
  }

  .lucky-lantern {
    font-size: 72px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 16px rgba(255,100,50,0.4));
    margin-bottom: 0.5rem;
    user-select: none;
  }

  .lucky-title {
    font-size: 28px;
    font-weight: 500;
    margin: 0.5rem 0 0.25rem;
    background: linear-gradient(90deg, #b85c00, #e8900a, #f5c842, #e8900a, #b85c00);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  .lucky-subtitle {
    font-size: 14px;
    color: #8a6500;
    margin: 0 0 1.5rem;
    letter-spacing: 0.05em;
  }

  .fortune-card {
    background: linear-gradient(135deg, #fff8e0, #fffbe8);
    border: 1.5px solid #f0c040;
    border-radius: var(--border-radius-lg);
    padding: 1.25rem 1.75rem;
    max-width: 320px;
    width: 100%;
    text-align: center;
    animation: pulse-glow 2.5s ease-in-out infinite, bounce 4s ease-in-out infinite;
    position: relative;
    z-index: 2;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .fortune-card:hover { transform: scale(1.03); }
  .fortune-card:active { transform: scale(0.97); }

  .fortune-icon { font-size: 32px; margin-bottom: 0.5rem; }

  .fortune-text {
    font-size: 15px;
    font-weight: 500;
    color: #7a4800;
    line-height: 1.6;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fortune-hint {
    font-size: 12px;
    color: #b8860b;
    margin-top: 0.75rem;
  }

  .coins-row {
    display: flex;
    gap: 16px;
    margin: 1.25rem 0 0.5rem;
    position: relative;
    z-index: 2;
  }

  .coin {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe066, #f0a800);
    border: 2px solid #c87800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: coinSpin 2.5s linear infinite;
    box-shadow: 2px 2px 8px rgba(180,100,0,0.25);
  }

  .coin:nth-child(2) { animation-delay: 0.4s; }
  .coin:nth-child(3) { animation-delay: 0.8s; }

  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .sp {
    position: absolute;
    font-size: 16px;
    animation: sparkle ease-in-out infinite;
  }
</style>

<div class="lucky-wrap" id="main">
  <div class="sparkles" id="sparkles"></div>

  <div class="lucky-lantern">🏮</div>
  <div class="lucky-title">행운이 들어옵니다</div>
  <div class="lucky-subtitle">福 · 오늘도 좋은 일만 가득하길 ·  福</div>

  <div class="fortune-card" onclick="newFortune()">
    <div class="fortune-icon" id="ficon">🍀</div>
    <div class="fortune-text" id="ftext">오늘 당신에게 큰 행운이<br>찾아올 것입니다!</div>
    <div class="fortune-hint">눌러서 오늘의 운세 뽑기 ✨</div>
  </div>

  <div class="coins-row">
    <div class="coin">🪙</div>
    <div class="coin">🪙</div>
    <div class="coin">🪙</div>
  </div>
</div>

<script>
const fortunes = [
  { icon: "🍀", text: "오늘 당신에게 큰 행운이\n찾아올 것입니다!" },
  { icon: "💰", text: "재물운이 활짝 열려\n풍요로운 하루가 됩니다." },
  { icon: "🌟", text: "빛나는 기회가 문앞에\n서 있습니다. 두드리세요!" },
  { icon: "🎯", text: "오늘 하는 모든 일이\n뜻대로 잘 풀립니다." },
  { icon: "🌈", text: "좋은 인연이 다가오고\n기쁜 소식이 들려옵니다." },
  { icon: "🦋", text: "변화가 당신에게\n새로운 행복을 가져옵니다." },
  { icon: "🌸", text: "아름다운 인연과 함께\n행복한 시간이 기다립니다." },
  { icon: "🏆", text: "노력한 만큼 빛나는\n결실을 맺게 됩니다." },
  { icon: "💎", text: "당신의 가치를 알아보는\n귀인이 나타납니다." },
  { icon: "🌙", text: "고요한 밤처럼 평온하고\n행복한 하루입니다." }
];

function newFortune() {
  const f = fortunes[Math.floor(Math.random() * fortunes.length)];
  document.getElementById('ficon').textContent = f.icon;
  document.getElementById('ftext').innerHTML = f.text.replace('\n','<br>');
  spawnBurst();
}

const sparkleSymbols = ['✦','✧','⋆','★','✨','⭐'];
const sparkleContainer = document.getElementById('sparkles');

function makeSpark() {
  const sp = document.createElement('div');
  sp.className = 'sp';
  sp.textContent = sparkleSymbols[Math.floor(Math.random() * sparkleSymbols.length)];
  sp.style.left = Math.random() * 90 + '%';
  sp.style.top = Math.random() * 90 + '%';
  const dur = 1.5 + Math.random() * 2;
  sp.style.animationDuration = dur + 's';
  sp.style.animationDelay = Math.random() * 3 + 's';
  sp.style.opacity = 0;
  sp.style.color = ['#f5c842','#f0a800','#e87020','#ff8c42','#ffd700'][Math.floor(Math.random()*5)];
  sparkleContainer.appendChild(sp);
}

for (let i = 0; i < 14; i++) makeSpark();

function spawnBurst() {
  for (let i = 0; i < 6; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.textContent = sparkleSymbols[Math.floor(Math.random() * sparkleSymbols.length)];
    sp.style.left = 30 + Math.random() * 40 + '%';
    sp.style.top = 20 + Math.random() * 40 + '%';
    sp.style.animationDuration = '0.8s';
    sp.style.animationDelay = '0s';
    sp.style.color = '#f5c842';
    sp.style.fontSize = '20px';
    sparkleContainer.appendChild(sp);
    setTimeout(() => sp.remove(), 900);
  }
}

const colors = ['#f5c842','#f0a800','#e87020','#ff8c42','#c8e020','#20c8e0'];
const wrap = document.getElementById('main');

for (let i = 0; i < 22; i++) {
  const c = document.createElement('div');
  c.className = 'confetti-piece';
  c.style.left = Math.random() * 100 + '%';
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDuration = 3 + Math.random() * 5 + 's';
  c.style.animationDelay = Math.random() * 5 + 's';
  c.style.width = 5 + Math.random() * 7 + 'px';
  c.style.height = 5 + Math.random() * 7 + 'px';
  c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
  wrap.appendChild(c);
}
</script>
