<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Centum CICD Success</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #581c87 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4rem;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .badge {
            background: #10b981;
            padding: 6px 18px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 25px;
            display: inline-block;
        }
        h1 { font-size: 3.5rem; margin: 0 0 15px 0; font-weight: 800; line-height: 1.2; }
        .highlight { color: #60a5fa; font-weight: 600; }
        .footer { font-size: 0.9rem; margin-top: 35px; color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">CI/CD Status: Active</div>
        <h1>Busan Centum <br><span class="highlight">Project Success</span></h1>
        <p>Park Se-hun's cloud infrastructure is running perfectly.</p>
        <div class="footer">
            Managed by GitHub Actions & AWS Infrastructure<br>
            Megazone Cloud Solution Architect Training
        </div>
    </div>
</body>
</html>
