<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>🍀 Lucky Page 🍀</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1abc9c, #2ecc71);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #f1c40f;
      color: black;
      transition: 0.3s;
    }

    button:hover {
      background: #f39c12;
    }

    #result {
      margin-top: 20px;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🍀 행운 뽑기 🍀</h1>
    <button onclick="getLuck()">행운 받기</button>
    <div id="result"></div>
  </div>

  <script>
    function getLuck() {
      const messages = [
        "🔥 오늘 대박 난다",
        "💰 돈 들어온다",
        "🍀 좋은 일 생긴다",
        "🎯 목표 달성 성공",
        "❤️ 좋은 인연 만난다",
        "⚡ 예상 못한 행운 등장"
      ];

      const random = Math.floor(Math.random() * messages.length);
      document.getElementById("result").innerText = messages[random];
    }
  </script>
</body>
</html>
