

<style>
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-18px) rotate(5deg)} }
  @keyframes spinY { 0%{transform:rotateY(0)} 100%{transform:rotateY(360deg)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 18px rgba(220,160,0,0.3)} 50%{box-shadow:0 0 48px rgba(220,160,0,0.65)} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes fall { 0%{top:-5%;opacity:1} 100%{top:108%;opacity:0.6} }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.3) rotate(0deg)} 50%{opacity:1;transform:scale(1) rotate(30deg)} }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

  .lw { min-height:520px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; padding:2.5rem 1rem;
    background:linear-gradient(160deg,#fffde0 0%,#fff3b0 50%,#ffe87a 100%);
    border-radius:var(--border-radius-lg); }

  .lantern { width:52px; height:68px; position:relative; animation:float 3s ease-in-out infinite; margin-bottom:0.5rem; }
  .lantern-body { width:52px; height:52px; border-radius:50% 50% 40% 40%; background:linear-gradient(160deg,#e83030,#c01818); border:2.5px solid #901010; position:absolute; top:8px; display:flex; align-items:center; justify-content:center; }
  .lantern-char { font-size:22px; font-weight:500; color:#ffe080; font-family:serif; line-height:1; }
  .lantern-top { width:28px; height:8px; background:#c87800; border-radius:4px 4px 0 0; margin:0 auto; }
  .lantern-bot { width:28px; height:8px; background:#c87800; border-radius:0 0 4px 4px; margin:0 auto; position:absolute; bottom:8px; left:12px; }
  .lantern-fringe { display:flex; gap:3px; justify-content:center; position:absolute; bottom:0; left:50%; transform:translateX(-50%); }
  .fringe-line { width:2px; height:10px; background:#f0a800; border-radius:1px; animation:pulse 1.5s ease-in-out infinite; }
  .fringe-line:nth-child(2){animation-delay:0.2s} .fringe-line:nth-child(3){animation-delay:0.4s} .fringe-line:nth-child(4){animation-delay:0.2s}

  .lucky-title { font-size:28px; font-weight:500; margin:0.5rem 0 0.2rem;
    background:linear-gradient(90deg,#a05000,#e08800,#f5c020,#e08800,#a05000);
    background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; animation:shimmer 3s linear infinite; font-family:serif; }

  .lucky-sub { font-size:13px; color:#8a6000; letter-spacing:0.08em; margin:0 0 1.5rem; }

  .fcard { background:linear-gradient(135deg,#fffcf0,#fff8d8); border:1.5px solid #e8c030;
    border-radius:var(--border-radius-lg); padding:1.25rem 1.75rem; max-width:300px; width:100%;
    text-align:center; animation:glow 2.5s ease-in-out infinite, bounce 4s ease-in-out infinite;
    position:relative; z-index:2; cursor:pointer; transition:transform 0.15s; }
  .fcard:hover{transform:scale(1.03)} .fcard:active{transform:scale(0.97)}

  .fcard-icon { width:36px; height:36px; margin:0 auto 0.6rem; }
  .fcard-text { font-size:15px; font-weight:500; color:#7a4800; line-height:1.65; min-height:50px; display:flex; align-items:center; justify-content:center; }
  .fcard-hint { font-size:12px; color:#b07010; margin-top:0.7rem; }

  .coins { display:flex; gap:14px; margin:1.25rem 0 0.25rem; position:relative; z-index:2; }
  .coin { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 38% 35%,#ffe566,#d48a00);
    border:2px solid #b06800; animation:spinY 2.4s linear infinite; box-shadow:2px 2px 8px rgba(160,90,0,0.25); }
  .coin:nth-child(2){animation-delay:0.4s} .coin:nth-child(3){animation-delay:0.8s}
  .coin-inner { width:24px; height:24px; border-radius:50%; border:1.5px solid #b06800; display:flex; align-items:center; justify-content:center; }
  .coin-char { font-size:13px; font-weight:500; color:#8a4e00; font-family:serif; }

  .star { position:absolute; pointer-events:none; animation:twinkle ease-in-out infinite; z-index:1; }
  .star svg { display:block; }

  .confetti { position:absolute; border-radius:2px; animation:fall linear infinite; pointer-events:none; }
</style>

<div class="lw" id="lw">
  <div class="lantern">
    <div class="lantern-top"></div>
    <div class="lantern-body"><span class="lantern-char">福</span></div>
    <div class="lantern-bot"></div>
    <div class="lantern-fringe">
      <div class="fringe-line"></div><div class="fringe-line"></div>
      <div class="fringe-line"></div><div class="fringe-line"></div>
    </div>
  </div>

  <div class="lucky-title">행운이 들어옵니다</div>
  <div class="lucky-sub">福 · 오늘도 좋은 일만 가득하길 · 福</div>

  <div class="fcard" onclick="newFortune()">
    <div class="fcard-icon" id="ficon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 3C10.8 3 5 8.8 5 16c0 4.5 2.2 8.4 5.5 10.8L18 33l7.5-6.2C28.8 24.4 31 20.5 31 16c0-7.2-5.8-13-13-13z" fill="#e83030" stroke="#c01010" stroke-width="1"/>
        <text x="18" y="20" text-anchor="middle" font-size="14" font-family="serif" fill="#ffe080" font-weight="500">福</text>
      </svg>
    </div>
    <div class="fcard-text" id="ftext">오늘 당신에게 큰 행운이<br>찾아올 것입니다!</div>
    <div class="fcard-hint">눌러서 오늘의 운세 뽑기</div>
  </div>

  <div class="coins">
    <div class="coin"><div class="coin-inner"><span class="coin-char">福</span></div></div>
    <div class="coin"><div class="coin-inner"><span class="coin-char">吉</span></div></div>
    <div class="coin"><div class="coin-inner"><span class="coin-char">運</span></div></div>
  </div>
</div>

<script>
const fortunes = [
  { svg: '<path d="M18 3C10.8 3 5 8.8 5 16c0 4.5 2.2 8.4 5.5 10.8L18 33l7.5-6.2C28.8 24.4 31 20.5 31 16c0-7.2-5.8-13-13-13z" fill="#e83030" stroke="#c01010" stroke-width="1"/><text x="18" y="20" text-anchor="middle" font-size="14" font-family="serif" fill="#ffe080" font-weight="500">福</text>', text: "오늘 당신에게 큰 행운이\n찾아올 것입니다!" },
  { svg: '<circle cx="18" cy="18" r="14" fill="#d48a00" stroke="#a06000" stroke-width="1.5"/><circle cx="18" cy="18" r="9" fill="none" stroke="#ffe070" stroke-width="1.5"/><text x="18" y="22" text-anchor="middle" font-size="13" font-family="serif" fill="#ffe070" font-weight="500">財</text>', text: "재물운이 활짝 열려\n풍요로운 하루가 됩니다." },
  { svg: '<polygon points="18,2 22,13 34,13 24,20 28,32 18,25 8,32 12,20 2,13 14,13" fill="#e8b000" stroke="#a07000" stroke-width="1"/>', text: "빛나는 기회가 문앞에\n서 있습니다. 두드리세요!" },
  { svg: '<path d="M18 4 C18 4 28 10 28 18 C28 24 24 30 18 30 C12 30 8 24 8 18 C8 10 18 4 18 4Z" fill="#4a9a30" stroke="#2a6a18" stroke-width="1"/><path d="M18 14 C18 14 14 10 10 12" fill="none" stroke="#80d040" stroke-width="1.5"/><path d="M18 14 C18 14 22 10 26 12" fill="none" stroke="#80d040" stroke-width="1.5"/>', text: "오늘 하는 모든 일이\n뜻대로 잘 풀립니다." },
  { svg: '<path d="M18 6 C10 6 4 12 4 18 C4 26 12 32 18 32 C24 32 32 26 32 18 C32 12 26 6 18 6Z" fill="#3070d0" stroke="#1050a0" stroke-width="1"/><path d="M8 14 C12 10 24 10 28 14" fill="none" stroke="#80b8ff" stroke-width="1.5"/><path d="M6 20 C10 28 26 28 30 20" fill="#5090e8" stroke="none"/>', text: "좋은 인연이 다가오고\n기쁜 소식이 들려옵니다." },
  { svg: '<ellipse cx="18" cy="18" rx="12" ry="8" fill="#c040c0" stroke="#800080" stroke-width="1" transform="rotate(-30 18 18)"/><ellipse cx="18" cy="18" rx="12" ry="8" fill="#e060e0" stroke="#900090" stroke-width="1" transform="rotate(30 18 18)"/><circle cx="18" cy="18" r="4" fill="#ffe0ff" stroke="#b040b0" stroke-width="1"/>', text: "변화가 당신에게\n새로운 행복을 가져옵니다." },
  { svg: '<rect x="6" y="18" width="24" height="12" rx="2" fill="#d08000" stroke="#a05800" stroke-width="1"/><polygon points="18,4 26,18 10,18" fill="#e8a000" stroke="#b07000" stroke-width="1"/><rect x="14" y="18" width="8" height="12" fill="#c07000" stroke="none"/>', text: "아름다운 인연과 함께\n행복한 시간이 기다립니다." },
  { svg: '<path d="M18 4L22 12L32 13L25 20L27 30L18 25L9 30L11 20L4 13L14 12Z" fill="#e8b000" stroke="#a07800" stroke-width="1"/><text x="18" y="21" text-anchor="middle" font-size="11" font-family="serif" fill="#7a4800" font-weight="500">吉</text>', text: "노력한 만큼 빛나는\n결실을 맺게 됩니다." },
  { svg: '<polygon points="18,4 22,14 32,14 24,21 27,31 18,25 9,31 12,21 4,14 14,14" fill="none" stroke="#3080d0" stroke-width="1.5"/><polygon points="18,8 21,15 28,15 23,19 25,27 18,22 11,27 13,19 8,15 15,15" fill="#90c0ff" stroke="#3060a0" stroke-width="1"/>', text: "당신의 가치를 알아보는\n귀인이 나타납니다." },
  { svg: '<circle cx="18" cy="18" r="13" fill="#1a1a3a" stroke="#3040a0" stroke-width="1.5"/><circle cx="18" cy="18" r="5" fill="#f0e050" stroke="#c0a800" stroke-width="1"/><circle cx="8" cy="10" r="1.5" fill="white"/><circle cx="26" cy="8" r="1" fill="white"/><circle cx="12" cy="26" r="1" fill="white"/><circle cx="28" cy="24" r="1.5" fill="white"/>', text: "고요한 밤처럼 평온하고\n행복한 하루입니다." }
];

function newFortune() {
  const f = fortunes[Math.floor(Math.random() * fortunes.length)];
  document.getElementById('ficon').innerHTML = '<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">' + f.svg + '</svg>';
  document.getElementById('ftext').innerHTML = f.text.replace('\n','<br>');
  spawnStars();
}

const lw = document.getElementById('lw');
const colors = ['#f5c020','#e08800','#e07020','#c8d820','#20c8e0','#e02060'];

for (let i = 0; i < 20; i++) {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.cssText = `left:${Math.random()*100}%;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;
  lw.appendChild(c);
}

function makeStar(x, y, size, delay) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${x}%;top:${y}%;animation-duration:${1.8+Math.random()*2}s;animation-delay:${delay}s;`;
  s.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 20 20"><polygon points="10,1 12,7 19,7 13,11 15,18 10,14 5,18 7,11 1,7 8,7" fill="#f0c020" stroke="#c09000" stroke-width="0.5"/></svg>`;
  lw.appendChild(s);
}

for (let i = 0; i < 12; i++) makeStar(Math.random()*90, Math.random()*90, 12+Math.random()*10, Math.random()*3);

function spawnStars() {
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${25+Math.random()*50}%;top:${15+Math.random()*40}%;animation-duration:0.7s;animation-delay:0s;`;
    s.innerHTML = `<svg width="18" height="18" viewBox="0 0 20 20"><polygon points="10,1 12,7 19,7 13,11 15,18 10,14 5,18 7,11 1,7 8,7" fill="#f0c020" stroke="#c09000" stroke-width="0.5"/></svg>`;
    lw.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}
</script>
